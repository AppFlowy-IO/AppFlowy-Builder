name: Build AppFlowy Linux
run-name: Build ${{ github.event.inputs.branch }}/${{ github.event.inputs.build_name }} - ${{ github.event.inputs.internal_build }}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo"
        required: true
        default: "AppFlowy-IO/AppFlowy-Premium"
      branch:
        description: "Branch"
        required: true
        default: "main"
      build_name:
        description: "Build Version (it should match the version in pubspec.yaml)"
        required: true
        default: "0.12.0"
      internal_build:
        type: choice
        description: "Internal Build Type (1 for internal, 0 for external)"
        required: true
        default: "1"
        options:
          - "0"
          - "1"
  workflow_call:
    inputs:
      repo:
        description: "Repo"
        required: true
        type: string
      branch:
        description: "Branch"
        required: true
        type: string
      build_name:
        description: "Build Version"
        required: true
        type: string
      internal_build:
        description: "Internal Build Type"
        required: true
        type: string
      upload_url:
        description: "Upload URL for release assets"
        required: false
        type: string

env:
  FLUTTER_VERSION: "3.41.9"
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-22.04]
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    env:
      LINUX_APP_RELEASE_PATH: frontend/appflowy_flutter/product/${{ inputs.build_name }}/linux/Release
      LINUX_ZIP_NAME: AppFlowy-${{ inputs.build_name }}-linux.tar.gz
      LINUX_PACKAGE_DEB_NAME: AppFlowy-${{ inputs.build_name }}-linux-x86_64.deb
      LINUX_PACKAGE_RPM_NAME: AppFlowy-${{ inputs.build_name }}-linux-x86_64.rpm
      LINUX_PACKAGE_TMP_RPM_NAME: AppFlowy-${{ inputs.build_name }}-2.x86_64.rpm
      LINUX_PACKAGE_APPIMAGE_NAME: AppFlowy-${{ inputs.build_name }}-linux-x86_64.AppImage

    steps:
      # the following step is required to avoid running out of space
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Install Rust toolchain
        id: rust_toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: ${{ matrix.target }}
          override: true
          profile: minimal

      - name: Install flutter
        id: flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.os }}
          workspaces: |
            frontend/rust-lib

      - uses: davidB/rust-cargo-make@v1
        with:
          version: "0.37.18"

      - name: Install prerequisites
        working-directory: frontend
        run: |
          sudo wget -qO /etc/apt/trusted.gpg.d/dart_linux_signing_key.asc https://dl-ssl.google.com/linux/linux_signing_key.pub
          sudo apt-get update
          sudo apt-get install -y --fix-broken
          sudo apt-get install -y build-essential libsqlite3-dev libssl-dev clang cmake ninja-build pkg-config libgtk-3-dev libcurl4-openssl-dev libepoxy-dev
          sudo apt-get install keybinder-3.0 libnotify-dev libwayland-cursor0 libwayland-client0 libwayland-egl1 unzip
          sudo apt-get -y install alien patchelf
          sudo apt install libmpv-dev mpv
          sudo apt install libasound2-dev
          # Install GStreamer for audioplayers_linux
          # Install libunwind-dev first to resolve dependency issues
          sudo apt-get -y install libunwind-dev
          sudo apt-get -y install libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          # Install FUSE for AppImage support
          sudo apt-get install -y fuse libfuse2
          source $HOME/.cargo/env
          cargo install duckscript_cli --force --locked
          rustup target add ${{ matrix.target }}
        shell: bash

      - name: Generate env file
        working-directory: frontend/appflowy_flutter
        run: |
          echo "INTERNAL_BUILD=${{ github.env.inputs.internal_build }}" >> .env
        shell: bash

      - name: Configure Git credentials for Cargo
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com" > ~/.git-credentials

      - name: Build AppFlowy
        working-directory: frontend
        run: |
          flutter config --enable-linux-desktop
          cd appflowy_flutter
          flutter pub get
          dart run pdfrx:remove_wasm_modules
          trap 'cd "$GITHUB_WORKSPACE/frontend/appflowy_flutter" && dart run pdfrx:remove_wasm_modules --revert' EXIT
          cd ..
          dart ./scripts/flutter_release_build/build_flowy.dart run . ${{ inputs.build_name }}

      - name: Bundle media_kit Linux runtime dependencies
        working-directory: frontend
        run: |
          set -euo pipefail
          BUNDLE_DIR="appflowy_flutter/product/${{ inputs.build_name }}/linux/Release"

          echo "Release bundle layout:"
          find "$BUNDLE_DIR" -maxdepth 3 -type f \( -name '*.so*' -o -name 'AppFlowy' \) | sort

          MEDIA_KIT_PLUGIN_PATH="$(find "$BUNDLE_DIR" -type f -name 'libmedia_kit_video_plugin.so' -print -quit)"
          if [ -z "$MEDIA_KIT_PLUGIN_PATH" ]; then
            echo "::error::libmedia_kit_video_plugin.so was not found in $BUNDLE_DIR"
            exit 1
          fi
          BUNDLE_LIB_DIR="$(dirname "$MEDIA_KIT_PLUGIN_PATH")"

          LIBMPV_PATH="$(ldconfig -p | awk '/libmpv\.so\.1 / { print $NF; exit }')"
          if [ -z "$LIBMPV_PATH" ]; then
            echo "::error::libmpv.so.1 was not found on the build runner"
            exit 1
          fi

          copy_runtime_lib() {
            local lib_path="$1"
            local lib_name
            lib_name="$(basename "$lib_path")"
            case "$lib_name" in
              libc.so.*|libdl.so.*|libm.so.*|libpthread.so.*|librt.so.*|ld-linux-*.so.*)
                return 0
                ;;
            esac
            cp -nL "$lib_path" "$BUNDLE_LIB_DIR/"
          }

          copy_runtime_lib "$LIBMPV_PATH"
          ldd "$LIBMPV_PATH" | awk '/=> \// { print $3 } /^\// { print $1 }' | while read -r lib_path; do
            copy_runtime_lib "$lib_path"
          done

          find "$BUNDLE_LIB_DIR" -maxdepth 1 -type f -name '*.so*' -print0 | while IFS= read -r -d '' bundled_lib; do
            if file "$bundled_lib" | grep -q 'ELF'; then
              patchelf --set-rpath '$ORIGIN' "$bundled_lib"
            fi
          done
          patchelf --set-rpath '$ORIGIN' "$MEDIA_KIT_PLUGIN_PATH"

          ldd "$MEDIA_KIT_PLUGIN_PATH"
          ldd "$BUNDLE_LIB_DIR/libmpv.so.1"

      - name: Archive Asset
        working-directory: ${{ env.LINUX_APP_RELEASE_PATH }}
        run: tar -czf ${{ env.LINUX_ZIP_NAME }} *

      - name: Build Linux package (.deb)
        working-directory: frontend
        run: |
          sh scripts/linux_distribution/deb/build_deb.sh appflowy_flutter/product/${{ inputs.build_name }}/linux/Release ${{ inputs.build_name }} ${{ env.LINUX_PACKAGE_DEB_NAME }}

      - name: Build Linux package (.rpm)
        working-directory: ${{ env.LINUX_APP_RELEASE_PATH }}
        run: |
          sudo alien -r ${{ env.LINUX_PACKAGE_DEB_NAME }}
          cp -r ${{ env.LINUX_PACKAGE_TMP_RPM_NAME }} ${{ env.LINUX_PACKAGE_RPM_NAME }}

      - name: Build Linux package (.AppImage)
        working-directory: frontend
        continue-on-error: true
        run: |
          echo "📦 Building AppImage package..."

          # Enable FUSE user space file systems
          echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

          python3 - <<'PY'
          from pathlib import Path

          script_path = Path("scripts/linux_distribution/appimage/build_appimage.sh")
          recipe_path = Path("scripts/linux_distribution/appimage/AppImageBuilder.yml")
          patched = False

          path = script_path
          text = path.read_text()
          old = 'DIR="\\$(dirname "\\$(readlink -f "\\$0")")"\\nexec "\\$DIR/${APP_NAME}" "\\$@"'
          new = 'DIR="\\$(dirname "\\$(readlink -f "\\$0")")"\\nexport LD_LIBRARY_PATH="\\$DIR/lib:\\${LD_LIBRARY_PATH:-}"\\nexec "\\$DIR/${APP_NAME}" "\\$@"'
          if old in text:
              path.write_text(text.replace(old, new))
              patched = True

          if recipe_path.exists():
              path = recipe_path
              text = path.read_text()
              if "LD_LIBRARY_PATH:" not in text:
                  runtime = (
                      "  runtime:\n"
                      "    env:\n"
                      "      LD_LIBRARY_PATH: '${APPDIR}/lib:${LD_LIBRARY_PATH}'\n"
                  )
                  if "  test:\n" in text:
                      marker = "  test:\n"
                      replacement = runtime + marker
                  elif "AppImage:\n" in text:
                      marker = "AppImage:\n"
                      replacement = runtime + marker
                  else:
                      raise SystemExit("Unable to patch AppImageBuilder runtime environment")
                  path.write_text(text.replace(marker, replacement, 1))
                  patched = True
              else:
                  patched = True

          if not patched:
              raise SystemExit("Unable to patch AppImage runtime library path")
          PY

          # Run AppImage build script
          sh scripts/linux_distribution/appimage/build_appimage.sh ${{ inputs.build_name }} || {
            echo "⚠️ AppImage build failed, but continuing..."
            # Create a dummy AppImage file to prevent upload failures
            touch "${{ env.LINUX_APP_RELEASE_PATH }}/${{ env.LINUX_PACKAGE_APPIMAGE_NAME }}"
            touch "AppFlowy-${{ inputs.build_name }}-x86_64.AppImage"
          }

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LINUX_ZIP_NAME }}
          path: ${{ env.LINUX_APP_RELEASE_PATH }}/${{ env.LINUX_ZIP_NAME }}

      - name: Upload ZIP to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.LINUX_ZIP_NAME }}"
          filepath="${{ env.LINUX_APP_RELEASE_PATH }}/$filename"

          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)

          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')

          echo "Uploading $filename to release..."

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload Linux package
        working-directory: frontend
        run: |
          ls -a

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LINUX_PACKAGE_APPIMAGE_NAME}}
          path: frontend/AppFlowy-${{ inputs.build_name }}-x86_64.AppImage

      - name: Upload AppImage to Release
        continue-on-error: true
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.LINUX_PACKAGE_APPIMAGE_NAME }}"
          filepath="frontend/AppFlowy-${{ inputs.build_name }}-x86_64.AppImage"

          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)

          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')

          echo "Uploading $filename to release..."

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LINUX_PACKAGE_RPM_NAME }}
          path: ${{ env.LINUX_APP_RELEASE_PATH }}/${{ env.LINUX_PACKAGE_RPM_NAME }}

      - name: Upload RPM to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.LINUX_PACKAGE_RPM_NAME }}"
          filepath="${{ env.LINUX_APP_RELEASE_PATH }}/$filename"

          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)

          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')

          echo "Uploading $filename to release..."

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LINUX_PACKAGE_DEB_NAME }}
          path: ${{ env.LINUX_APP_RELEASE_PATH }}/${{ env.LINUX_PACKAGE_DEB_NAME }}

      - name: Upload DEB to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.LINUX_PACKAGE_DEB_NAME }}"
          filepath="${{ env.LINUX_APP_RELEASE_PATH }}/$filename"

          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)

          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')

          echo "Uploading $filename to release..."

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body
