name: Build AppFlowy Windows
run-name: Build ${{ github.event.inputs.branch }}/${{ github.event.inputs.build_name }} - ${{ github.event.inputs.internal_build }}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo"
        required: true
        default: "AppFlowy-IO/AppFlowy-Premium"
      branch:
        description: "Branch"
        required: true
        default: "main"
      build_name:
        description: "Build Version (it should match the version in pubspec.yaml)"
        required: true
        default: "0.12.5"
      internal_build:
        type: choice
        description: "Internal Build Type (1 for internal, 0 for external)"
        required: true
        default: "1"
        options:
          - "0"
          - "1"
  workflow_call:
    inputs:
      repo:
        description: "Repo"
        required: true
        type: string
      branch:
        description: "Branch"
        required: true
        type: string
      build_name:
        description: "Build Version"
        required: true
        type: string
      internal_build:
        description: "Internal Build Type"
        required: true
        type: string
      upload_url:
        description: "Upload URL for release assets"
        required: false
        type: string

env:
  FLUTTER_VERSION: "3.41.9"
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  build:
    env:
      WINDOWS_APP_RELEASE_PATH: frontend\appflowy_flutter\product\${{ inputs.build_name }}\windows
      WINDOWS_ZIP_NAME: AppFlowy-${{ inputs.build_name }}-windows-x86_64.zip
      WINDOWS_INSTALLER_NAME: AppFlowy-${{ inputs.build_name }}-windows-x86_64
      # The windows-latest runner now ships CMake 4.x, which dropped support for
      # cmake_minimum_required(VERSION <3.5). A bundled third-party dep
      # (firebase_cpp_sdk_windows) still declares an old minimum, so the flutter
      # Windows configure aborts with "Compatibility with CMake < 3.5 has been
      # removed" and produces no runner\Release output. CMake >=3.31 reads this
      # env var to restore the old-minimum behavior for every configure at once.
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      # MSVC 14.51 on windows-latest turns /await + <experimental/coroutine>
      # usage in several Flutter Windows plugins into STL1011 hard errors.
      CL: "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"

    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: x86_64-pc-windows-msvc
          override: true
          components: rustfmt
          profile: minimal

      - uses: davidB/rust-cargo-make@v1
        with:
          version: "0.37.18"

      - name: Install prerequisites
        working-directory: frontend
        run: |
          vcpkg integrate install
          cargo install duckscript_cli --force --locked

      - name: Generate env file
        working-directory: frontend/appflowy_flutter
        run: |
          echo "INTERNAL_BUILD=${{ inputs.internal_build }}" >> .env
        shell: bash

      - name: Configure Git credentials for Cargo
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: |
          git config --global credential.helper store
          git config --system core.longpaths true
          echo "https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Build Windows app
        working-directory: frontend
        # the cargo make script has to be run separately because of file locking issues
        run: |
          flutter config --enable-windows-desktop
          dart ./scripts/flutter_release_build/build_flowy.dart exclude-directives . ${{ inputs.build_name }}
          cargo make --env APP_VERSION=${{ inputs.build_name }} --profile production-windows-x86 code_generation
          cargo make --env APP_VERSION=${{ inputs.build_name }} --profile production-windows-x86 appflowy
          dart ./scripts/flutter_release_build/build_flowy.dart include-directives . ${{ inputs.build_name }}

      # The Windows flutter-build runs through duckscript `exec cmd.exe /c flutter build`,
      # which does NOT propagate a non-zero exit code, and `copy-to-product-windows`'s
      # `glob_cp` silently copies nothing when its source glob matches no files. So a
      # failed `flutter build windows` makes the step above go green while producing no
      # app output, and the failure only surfaces later as a cryptic "directory is
      # invalid" in the Copy step. This step prints the real build/output tree and fails
      # loudly here, right after the build, with a pointer to the actual error.
      - name: Diagnose Windows build output
        run: |
          Write-Host "===== flutter build\windows tree ====="
          if (Test-Path "frontend\appflowy_flutter\build\windows") {
            Get-ChildItem -Recurse -Directory "frontend\appflowy_flutter\build\windows" | Select-Object -ExpandProperty FullName
          } else {
            Write-Host "build\windows does NOT exist - flutter build windows produced no output"
          }
          Write-Host "===== product tree ($env:WINDOWS_APP_RELEASE_PATH) ====="
          if (Test-Path "$env:WINDOWS_APP_RELEASE_PATH") {
            Get-ChildItem -Recurse "$env:WINDOWS_APP_RELEASE_PATH" | Select-Object -ExpandProperty FullName
          } else {
            Write-Host "$env:WINDOWS_APP_RELEASE_PATH does NOT exist"
          }
          $expected = "$env:WINDOWS_APP_RELEASE_PATH\AppFlowy"
          if (-not (Test-Path $expected)) {
            Write-Error "Expected app output directory '$expected' was not created. 'flutter build windows' or the copy-to-product-windows cargo-make task failed silently - check the 'Build Windows app' logs above for the real flutter build error."
            exit 1
          }
          Write-Host "OK: $expected exists"

      - name: Copy Visual C++ redistributables
        run: |
          Copy-Item "C:\Windows\System32\msvcp140.dll" "${{ env.WINDOWS_APP_RELEASE_PATH }}\AppFlowy\"
          Copy-Item "C:\Windows\System32\vcruntime140.dll" "${{ env.WINDOWS_APP_RELEASE_PATH }}\AppFlowy\"
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" "${{ env.WINDOWS_APP_RELEASE_PATH }}\AppFlowy\"

      - name: Archive Asset
        uses: vimtor/action-zip@v1
        with:
          files: ${{ env.WINDOWS_APP_RELEASE_PATH }}\
          dest: ${{ env.WINDOWS_APP_RELEASE_PATH }}\${{ env.WINDOWS_ZIP_NAME }}

      - name: Copy installer config & icon file
        working-directory: frontend
        run: |
          cp scripts/windows_installer/* ../${{ env.WINDOWS_APP_RELEASE_PATH }}

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer executable
        working-directory: ${{ env.WINDOWS_APP_RELEASE_PATH }}
        run: |
          iscc /F${{ env.WINDOWS_INSTALLER_NAME }} inno_setup_config.iss /DAppVersion=${{ inputs.build_name }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_INSTALLER_NAME }}.exe
          path: ${{ env.WINDOWS_APP_RELEASE_PATH }}\Output\${{ env.WINDOWS_INSTALLER_NAME }}.exe

      - name: Upload EXE to Release
        if: inputs.upload_url != ''
        shell: bash
        run: |
          filename="${{ env.WINDOWS_INSTALLER_NAME }}.exe"
          filepath="${{ env.WINDOWS_APP_RELEASE_PATH }}/Output/$filename"

          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)

          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')

          echo "Uploading $filename to release..."

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_ZIP_NAME }}
          path: ${{ env.WINDOWS_APP_RELEASE_PATH }}/${{ env.WINDOWS_ZIP_NAME }}

      - name: Upload ZIP to Release
        if: inputs.upload_url != ''
        shell: bash
        run: |
          filename="${{ env.WINDOWS_ZIP_NAME }}"
          filepath="${{ env.WINDOWS_APP_RELEASE_PATH }}/$filename"

          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)

          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')

          echo "Uploading $filename to release..."

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body
